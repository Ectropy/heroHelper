    return "hidden";
  }

  /**
   * Update the custom captions display with the currently active cues.
   * Sanitizes cue text via textContent to prevent XSS from malformed VTT files.
   * Called on the track's cuechange event.
   *
   * In iOS native fullscreen, we skip custom rendering because iOS renders
   * its own native captions and our overlay is not visible anyway.
   */
  function updateCaptionsDisplay() {
    if (isInIOSFullscreen) {
      captionsDisplay.innerHTML = "";
      return;
    }
    if (!captionsEnabled || !v.textTracks || v.textTracks.length === 0) {
      captionsDisplay.innerHTML = "";
      return;
    }
    var t = v.textTracks[0];
    if (t.activeCues && t.activeCues.length > 0) {
      var cueText = "";
      for (var i = 0; i < t.activeCues.length; i++) {
        if (i > 0) cueText += "<br>";
        // Sanitize cue text: extract as textContent to neutralize any embedded HTML/script
        var tempDiv = document.createElement("div");
        tempDiv.textContent = t.activeCues[i].text;
        cueText += "<span>" + tempDiv.innerHTML + "</span>";
      }
      captionsDisplay.innerHTML = cueText;
    } else {
      captionsDisplay.innerHTML = "";
    }
  }

  /**
   * Show the poster overlay to prevent a black screen.
   * Used when video ends all loops or when reduced motion is preferred.
   */
  function showPosterOverlay() {
    overlay.style.display = "block";
  }

  /**
   * Hide the poster overlay when video resumes playback.
   */
  function hidePosterOverlay() {
    overlay.style.display = "none";
  }

  /**
   * Fullscreen detection - cross-browser compatibility.
   * Checks both the standard Fullscreen API (desktop/Android) and
   * iOS native video fullscreen state.
   * @returns {boolean} True if currently in any type of fullscreen.
   */
  function isFs(){
    return !!(document.fullscreenElement
        || document.webkitFullscreenElement
        || document.mozFullScreenElement
        || document.msFullscreenElement
        || isInIOSFullscreen);
  }

  /**
   * Update play-from-start button text based on current mute state.
   * When muted, the button offers to unmute and play from start.
   * When unmuted, it simply offers to play from start.
   */
  function updatePlayFromStartBtn() {
    if (v.muted) {
      pfst.textContent = "Unmute and play from start";
      pfsb.setAttribute("aria-label", "Unmute and play from start");
    } else {
      pfst.textContent = "Play from start";
      pfsb.setAttribute("aria-label", "Play from start");
    }
  }

  /**
   * Update the volume wrapper ARIA valuenow attribute to reflect current volume.
   * Keeps the slider role's accessible value in sync with the actual volume.
   * Skipped on iOS since the volume control is hidden.
   * @param {number} val - Volume value between 0 and 1.
   */
  function updateVolumeWrapAria(val) {
    if (isIOS) return;
    volWrap.setAttribute("aria-valuenow", Math.round(val * 100));
  }

  /**
   * Synchronize the mute button icon, aria-label, volume slider, and
   * play-from-start button text with the actual video mute state.
   *
   * This is critical for iOS where the user can toggle mute via iOS native
   * fullscreen controls (which bypass our mute button onclick handler).
   * On non-iOS platforms, this also catches mute state changes from
   * browser picture-in-picture controls or media session API.
   */
  function syncMuteButton() {
    if (v.muted) {
      mb.innerHTML = '<i aria-hidden="true" class="fa-solid fa-volume-xmark"></i>';
      mb.setAttribute("aria-label", "Unmute video");
      if (!isIOS) {
        vol.value = 0;
        updateVolumeWrapAria(0);
      }
    } else {
      mb.innerHTML = '<i aria-hidden="true" class="fa-solid fa-volume-high"></i>';
      mb.setAttribute("aria-label", "Mute video");
      if (!isIOS) {
        var currentVolume = v.volume;
        if (currentVolume > 0) {
          lastVolume = currentVolume;
        }
        vol.value = currentVolume;
        updateVolumeWrapAria(currentVolume);
      }
    }
    updatePlayFromStartBtn();
  }

  /**
   * Ensure the captions track is properly loaded and ready.
   * On iOS with native HLS, the text track may need to be re-added
   * or its src re-set to ensure cues are loaded. This is because iOS
   * Safari's native HLS handling can sometimes discard or ignore
   * text tracks that were added before the HLS manifest was parsed.
   */
  function ensureTrackLoaded() {
    if (!v.textTracks || v.textTracks.length === 0) return;

    var textTrack = v.textTracks[0];

    // If the track has cues, it's already loaded
    if (textTrack.cues && textTrack.cues.length > 0) return;

    // Track has no cues -- remove and re-add the track element to force a re-parse
    var existingTrack = document.getElementById("heroTrack");
    if (existingTrack) {
      var newTrack = document.createElement("track");
      newTrack.id = "heroTrack";
      newTrack.kind = "captions";
      newTrack.label = "English";
      newTrack.srclang = "en";
      newTrack.src = captionSrc;
      newTrack.setAttribute("default", "");

      existingTrack.parentNode.removeChild(existingTrack);
      v.appendChild(newTrack);

      // Re-attach cuechange listener and set desired mode on the new track
      if (v.textTracks && v.textTracks.length > 0) {
        v.textTracks[0].addEventListener("cuechange", updateCaptionsDisplay);
        var desiredMode = getDesiredCaptionsMode();
        if (isIOS && desiredMode === "showing") {
          v.textTracks[0].mode = "disabled";
          setTimeout(function() {
            v.textTracks[0].mode = "showing";
          }, 0);
        } else {
          v.textTracks[0].mode = desiredMode;
        }
      }
    }
  }

  // =====================================================================
  // HLS.js INITIALIZATION - adaptive streaming for non-Safari browsers
  // =====================================================================

  /**
   * Attempt autoplay and show the poster overlay if blocked.
   * Firefox and Edge do not reliably trigger native autoplay for MSE/blob URLs
   * (the HLS.js path) — an explicit play() call at loadedmetadata is required.
   * v.autoplay = true (set above) ensures Edge's policy check passes even when
   * Akamai strips the HTML autoplay attribute, making this play() permissible.
   * Button state is handled by the playing/pause event listeners, not here.
   */
  function attemptAutoplay() {
    var playPromise = v.play();
    if (playPromise !== undefined) {
      playPromise.catch(function(err) {
        console.warn("[hero-video] Autoplay blocked —", err.name + ":", err.message);
        showPosterOverlay();
      });
    }
  }

  if (Hls.isSupported()) {
    var h = new Hls();
    h.loadSource(src);
    h.attachMedia(v);
    // Log fatal HLS.js errors — these would prevent loadedmetadata from ever firing.
    h.on(Hls.Events.ERROR, function(event, data) {
      if (data.fatal) {
        console.error("[hero-video] HLS.js fatal error —", data.type, data.details);
      }
    });
  } else if (v.canPlayType("application/vnd.apple.mpegurl")) {
    // Safari natively supports HLS — v.autoplay and v.muted are already set above.
    v.src = src;
  }

  // =====================================================================
  // CAPTIONS INITIALIZATION + DEFERRED AUTOPLAY
  // loadedmetadata fires when readyState reaches HAVE_METADATA (1).
  // For HLS.js (blob/MSE path), this is the earliest point where Chrome,
  // Firefox, and Edge have enough context to evaluate muted autoplay.
  // Safari's native HLS path relies on the autoplay attribute alone.
  // =====================================================================

  v.addEventListener("loadedmetadata", function() {
    setCaptionsMode("disabled");
    if (v.textTracks && v.textTracks.length > 0) {
      v.textTracks[0].addEventListener("cuechange", updateCaptionsDisplay);
    }
    if (Hls.isSupported()) {
      attemptAutoplay();
    }
    monitorTrackModeChanges();
  });

  // =====================================================================
  // POSTER OVERLAY MANAGEMENT
  // =====================================================================

  // Update button state and hide poster overlay whenever video is actively playing.
  // This replaces the play button state management that was previously in attemptAutoplay()
  // and its catch handler — native autoplay has no Promise to catch, so we rely on events.
  v.addEventListener("playing", function() {
    hidePosterOverlay();
    pb.innerHTML = '<i aria-hidden="true" class="fa-solid fa-pause"></i>';
    pb.setAttribute("aria-label", "Pause video");
  });

  // Update button state when video pauses (user-initiated or autoplay blocked).
  v.addEventListener("pause", function() {
    pb.innerHTML = '<i aria-hidden="true" class="fa-solid fa-play"></i>';
    pb.setAttribute("aria-label", "Play video");
  });

  // =====================================================================
  // MUTE/VOLUME STATE SYNCHRONIZATION
  // Listen for the native "volumechange" event to keep the mute button icon
  // in sync with the actual mute/volume state. This fires whenever video.muted
  // or video.volume changes, catching changes from:
  //   - iOS native fullscreen mute/unmute controls
  //   - Browser picture-in-picture controls
  //   - Media session API controls
  // =====================================================================

  v.addEventListener("volumechange", function() {
    syncMuteButton();
  });

  // =====================================================================
  // LOOP MANAGEMENT - auto-pause after maximum loops to conserve resources
  // =====================================================================

  v.addEventListener("ended", function(){
    loopCount++;
    if (loopCount < maxLoops) {
      v.currentTime = 0;
      v.play();
    } else {
      autoPaused = true;
      pb.innerHTML = '<i aria-hidden="true" class="fa-solid fa-play"></i>';
      pb.setAttribute("aria-label", "Play video");
      showPosterOverlay();
      announceToSR("Video has ended. Press play to restart.");
    }
  });

  // =====================================================================
  // PLAY / PAUSE CONTROL
  // =====================================================================

  /**
   * Toggle play/pause state.
   * Resets loop counter when resuming after auto-pause so the user
   * gets another full set of loops.
   */
  function togglePlayPause() {
    if (v.paused || v.ended) {
      if (autoPaused) {
        loopCount = 0;
        autoPaused = false;
        v.currentTime = 0;
      }
      hidePosterOverlay();
      v.play();
      pb.innerHTML = '<i aria-hidden="true" class="fa-solid fa-pause"></i>';
      pb.setAttribute("aria-label", "Pause video");
      announceToSR("Video playing");
    } else {
      v.pause();
      pb.innerHTML = '<i aria-hidden="true" class="fa-solid fa-play"></i>';
      pb.setAttribute("aria-label", "Play video");
      announceToSR("Video paused");
    }
  }

  pb.onclick = togglePlayPause;

  // Mouse click on video toggles play/pause for mouse users.
  // Keyboard users use the Play/Pause button instead (video is not in tab order).
  v.onclick = togglePlayPause;

  // =====================================================================
  // MUTE / VOLUME CONTROLS
  // =====================================================================

  // Mute/unmute toggle - synchronizes icon and volume slider, remembers user's volume preference.
  // On iOS, video.muted IS writable (unlike video.volume), so the mute toggle works on all platforms.
  // The volume slider sync is skipped on iOS since it's hidden.
  mb.onclick = function(){
    v.muted = !v.muted;
    if (v.muted) {
      mb.innerHTML = '<i aria-hidden="true" class="fa-solid fa-volume-xmark"></i>';
      mb.setAttribute("aria-label", "Unmute video");
      if (!isIOS) {
        vol.value = 0;
        updateVolumeWrapAria(0);
      }
      announceToSR("Video muted");
    } else {
      if (!isIOS) {
        v.volume = lastVolume;
        vol.value = lastVolume;
        updateVolumeWrapAria(lastVolume);
      }
      mb.innerHTML = '<i aria-hidden="true" class="fa-solid fa-volume-high"></i>';
      mb.setAttribute("aria-label", "Mute video");
      if (isIOS) {
        announceToSR("Video unmuted");
      } else {
        announceToSR("Video unmuted, volume " + Math.round(lastVolume * 100) + " percent");
      }
    }
    updatePlayFromStartBtn();
  };

  // Volume slider input event - updates video volume and mute state in real time
  vol.oninput = function(){
    var val = parseFloat(this.value);
    // Clamp value to valid range as a defensive measure
    if (isNaN(val) || val < 0) val = 0;
    if (val > 1) val = 1;

    v.volume = val;
    v.muted  = val === 0;

    // Remember the volume if user sets it above 0
    if (val > 0) {
      lastVolume = val;
    }

    updateVolumeWrapAria(val);

    mb.innerHTML = val === 0
      ? '<i aria-hidden="true" class="fa-solid fa-volume-xmark"></i>'
      : '<i aria-hidden="true" class="fa-solid fa-volume-high"></i>';
    mb.setAttribute("aria-label", val === 0 ? "Unmute video" : "Mute video");
    updatePlayFromStartBtn();
  };

  // Announce volume on change (mouseup/touchend) to avoid spamming screen readers during drag
  vol.addEventListener("change", function() {
    var val = parseFloat(this.value);
    if (isNaN(val)) val = 0;
    announceToSR("Volume " + Math.round(val * 100) + " percent");
  });

  // =====================================================================
  // VOLUME WRAPPER KEYBOARD SUPPORT
  // Arrow keys on the wrapper adjust the hidden input and fire its oninput
  // handler, keeping all volume logic in one place. This is necessary because
  // the input has tabindex="-1" and cannot receive keyboard focus directly.
  // =====================================================================

  volWrap.addEventListener("keydown", function(e) {
    var val = parseFloat(vol.value);
    if (isNaN(val)) val = 0;

    if (e.key === "ArrowRight" || e.key === "ArrowUp") {
      e.preventDefault();
      val = Math.min(val + 0.05, 1);
    } else if (e.key === "ArrowLeft" || e.key === "ArrowDown") {
      e.preventDefault();
      val = Math.max(val - 0.05, 0);
    } else if (e.key === "Home") {
      e.preventDefault();
      val = 0;
    } else if (e.key === "End") {
      e.preventDefault();
      val = 1;
    } else {
      return; // Ignore all other keys
    }

    // Round to avoid floating point drift
    val = Math.round(val * 100) / 100;
    vol.value = val;

    // Manually fire oninput to keep all volume logic centralized
    var event = new Event("input", { bubbles: true });
    vol.dispatchEvent(event);

    announceToSR("Volume " + Math.round(val * 100) + " percent");
  });

  // Click on the volume wrapper focuses it for keyboard users
  volWrap.addEventListener("click", function() {
    volWrap.focus();
  });

  // =====================================================================
  // CLOSED CAPTIONS TOGGLE
  // =====================================================================

  ccb.onclick = function() {
    captionsEnabled = !captionsEnabled;
    if (captionsEnabled) {
      // Ensure the track is loaded before enabling captions.
      // On iOS with native HLS, the track may not have loaded cues yet.
      ensureTrackLoaded();

      // Set track mode based on current fullscreen state:
      // - iOS fullscreen: "showing" (native rendering)
      // - Otherwise: "hidden" (custom rendering via cuechange events)
      setCaptionsMode(getDesiredCaptionsMode());
      ccb.classList.add("cc-active");
      ccb.innerHTML = '<i aria-hidden="true" class="fa-solid fa-closed-captioning"></i>';
      ccb.setAttribute("aria-label", "Disable closed captions");
      ccb.setAttribute("aria-pressed", "true");
      announceToSR("Closed captions enabled");
      updateCaptionsDisplay();
    } else {
      setCaptionsMode("disabled");
      ccb.classList.remove("cc-active");
      ccb.innerHTML = '<i aria-hidden="true" class="fa-solid fa-closed-captioning"></i>';
      ccb.setAttribute("aria-label", "Enable closed captions");
      ccb.setAttribute("aria-pressed", "false");
      captionsDisplay.innerHTML = "";
      announceToSR("Closed captions disabled");
    }
  };

  // =====================================================================
  // iOS CAPTIONS RECOVERY
  // Monitor text track mode changes that may be triggered by iOS native
  // fullscreen caption controls. This keeps our captionsEnabled state
  // and CC button appearance in sync with what iOS is actually doing.
  //
  // iOS native fullscreen provides its own subtitle picker. If the user
  // toggles captions via that menu, the textTrack mode changes without
  // going through our CC button handler.
  // =====================================================================

  /**
   * Set up a listener on textTracks for mode changes triggered by iOS
   * native fullscreen caption controls.
   */
  function monitorTrackModeChanges() {
    if (!v.textTracks || v.textTracks.length === 0) return;

    v.textTracks.addEventListener("change", function() {
      if (!isInIOSFullscreen) return;

      var textTrack = v.textTracks[0];
      if (!textTrack) return;

      if (textTrack.mode === "showing" && !captionsEnabled) {
        // User enabled captions via iOS native controls
        captionsEnabled = true;
        ccb.classList.add("cc-active");
        ccb.setAttribute("aria-label", "Disable closed captions");
        ccb.setAttribute("aria-pressed", "true");
      } else if (textTrack.mode === "disabled" && captionsEnabled) {
        // User disabled captions via iOS native controls
        captionsEnabled = false;
        ccb.classList.remove("cc-active");
        ccb.setAttribute("aria-label", "Enable closed captions");
        ccb.setAttribute("aria-pressed", "false");
        captionsDisplay.innerHTML = "";
      }
    });
  }

  // =====================================================================
  // FULLSCREEN CONTROLS
  // =====================================================================

  /**
   * Enter fullscreen - uses the appropriate method based on platform.
   * Desktop/Android: Standard Fullscreen API on the wrapper element.
   * iOS: Native video fullscreen via video.webkitEnterFullscreen().
   *
   * On iOS, if captions are enabled, we pre-set the track mode to "showing"
   * BEFORE entering fullscreen so iOS Safari picks up the track state.
   */
  function enterFullscreen() {
    if (isIOS && hasNativeVideoFullscreen) {
      if (captionsEnabled) {
        ensureTrackLoaded();
        if (v.textTracks && v.textTracks.length > 0) {
          v.textTracks[0].mode = "showing";
        }
      }
      v.webkitEnterFullscreen();
    } else if (hasFullscreenAPI) {
      (wrap.requestFullscreen || wrap.webkitRequestFullscreen ||
       wrap.mozRequestFullScreen || wrap.msRequestFullscreen).call(wrap);
    }
  }

  /**
   * Exit fullscreen - uses the appropriate method based on platform.
   * Desktop/Android: Standard Fullscreen API.
   * iOS: Native video fullscreen exit via video.webkitExitFullscreen().
   */
  function exitFullscreen() {
    if (isIOS && isInIOSFullscreen) {
      if (typeof v.webkitExitFullscreen === "function") {
        v.webkitExitFullscreen();
      }
    } else {
      (document.exitFullscreen || document.webkitExitFullscreen ||
       document.mozCancelFullScreen || document.msExitFullscreen).call(document);
    }
  }

  // Fullscreen toggle button
  fb.onclick = function(){
    if (isFs()) {
      exitFullscreen();
    } else {
      enterFullscreen();
    }
  };

  // =====================================================================
  // iOS NATIVE FULLSCREEN EVENT HANDLERS
  // iOS fires webkitbeginfullscreen and webkitendfullscreen on the video
  // element when entering/exiting native fullscreen. These events are
  // iOS-specific and do not fire on desktop Safari.
  //
  // When entering iOS fullscreen, iOS takes over the entire video UI.
  // Our custom controls are NOT visible; iOS provides its own.
  //
  // When exiting iOS fullscreen, iOS ALWAYS pauses the video. The existing
  // "pause" event listener handles play/pause button sync automatically.
  // =====================================================================

  v.addEventListener("webkitbeginfullscreen", function() {
    isInIOSFullscreen = true;
    fb.innerHTML = '<i aria-hidden="true" class="fa-solid fa-compress"></i>';
    fb.setAttribute("aria-label", "Exit fullscreen");

    // Add CSS class to allow native ::cue rendering in iOS fullscreen
    wrap.classList.add("ios-fullscreen-active");

    // Switch captions to native rendering for iOS fullscreen
    if (captionsEnabled) {
      ensureTrackLoaded();
      if (v.textTracks && v.textTracks.length > 0) {
        v.textTracks[0].mode = "showing";
      }
      captionsDisplay.innerHTML = "";
    }

    announceToSR("Entered fullscreen mode");
  });

  v.addEventListener("webkitendfullscreen", function() {
    isInIOSFullscreen = false;
    fb.innerHTML = '<i aria-hidden="true" class="fa-solid fa-expand"></i>';
    fb.setAttribute("aria-label", "Enter fullscreen");

    // Remove CSS class for native ::cue rendering
    wrap.classList.remove("ios-fullscreen-active");

    // Switch captions back to custom rendering
    if (captionsEnabled) {
      setCaptionsMode("hidden");
      updateCaptionsDisplay();
    }

    // Sync mute button -- user may have toggled mute via iOS native controls.
    // Play/pause sync is handled by the "pause" event listener (iOS always pauses on FS exit).
    syncMuteButton();

    announceToSR("Exited fullscreen mode");
  });

  // =====================================================================
  // STANDARD FULLSCREEN CHANGE EVENTS (desktop/Android)
  // =====================================================================

  // Fullscreen change event listeners - cross-browser support
  document.addEventListener("fullscreenchange", updateFsBtn);
  document.addEventListener("webkitfullscreenchange", updateFsBtn);
  document.addEventListener("mozfullscreenchange", updateFsBtn);
  document.addEventListener("MSFullscreenChange", updateFsBtn);

  /**
   * Update fullscreen button icon and toggle visibility of fullscreen-only
   * controls (progress bar and play-from-start button).
   * Only handles standard Fullscreen API changes (desktop/Android).
   * iOS fullscreen is handled by the webkitbeginfullscreen/webkitendfullscreen handlers above.
   */
  function updateFsBtn(){
    if (isIOS) return;

    var fsElement = document.fullscreenElement || document.webkitFullscreenElement ||
                    document.mozFullScreenElement || document.msFullscreenElement;

    if (fsElement) {
      fb.innerHTML = '<i aria-hidden="true" class="fa-solid fa-compress"></i>';
      fb.setAttribute("aria-label", "Exit fullscreen");
      progressWrap.style.display = "flex";
      pfsb.style.display = "flex";
      announceToSR("Entered fullscreen mode");
    } else {
      fb.innerHTML = '<i aria-hidden="true" class="fa-solid fa-expand"></i>';
      fb.setAttribute("aria-label", "Enter fullscreen");
      progressWrap.style.display = "none";
      pfsb.style.display = "none";
      announceToSR("Exited fullscreen mode");
    }
    updatePlayFromStartBtn();
  }

  // =====================================================================
  // PLAY FROM START BUTTON - resets playback and conditionally unmutes
  // =====================================================================

  pfsb.onclick = function() {
    loopCount = 0;
    autoPaused = false;
    v.currentTime = 0;

    // Only unmute if currently muted - preserves user's chosen volume level
    if (v.muted) {
      v.muted = false;
      if (!isIOS) {
        v.volume = lastVolume;
        vol.value = lastVolume;
        updateVolumeWrapAria(lastVolume);
      }
      mb.innerHTML = '<i aria-hidden="true" class="fa-solid fa-volume-high"></i>';
      mb.setAttribute("aria-label", "Mute video");
    }

    hidePosterOverlay();
    v.play();
    pb.innerHTML = '<i aria-hidden="true" class="fa-solid fa-pause"></i>';
    pb.setAttribute("aria-label", "Pause video");
    announceToSR("Playing video from start");
    updatePlayFromStartBtn();
  };

  // =====================================================================
  // PROGRESS BAR - only functional in fullscreen mode
  // =====================================================================

  /**
   * Update the progress bar fill width based on current video time.
   */
  function updateProgressBar() {
    if (!isFs() || isInIOSFullscreen || !v.duration || isNaN(v.duration)) return;
    var pct = (v.currentTime / v.duration) * 100;
    progressFilled.style.width = pct + "%";
    progressWrap.setAttribute("aria-valuenow", Math.round(pct));
  }

  // Update progress bar during playback (skip updates while user is dragging)
  v.addEventListener("timeupdate", function() {
    if (!isDragging) {
      updateProgressBar();
    }
  });

  /**
   * Seek the video to a position based on a mouse or touch event on the progress bar.
   * Clamps the position to the track bounds to prevent out-of-range seeks.
   * @param {MouseEvent|Touch} e - The event or touch object with clientX.
   */
  function seekToPosition(e) {
    if (!v.duration || isNaN(v.duration)) return;
    var rect = progressTrack.getBoundingClientRect();
    var x = e.clientX - rect.left;
    if (x < 0) x = 0;
    if (x > rect.width) x = rect.width;
    var pct = x / rect.width;
    v.currentTime = pct * v.duration;
    progressFilled.style.width = (pct * 100) + "%";
    progressWrap.setAttribute("aria-valuenow", Math.round(pct * 100));
  }

  // Mouse interactions for progress bar scrubbing
  progressWrap.addEventListener("mousedown", function(e) {
    if (!isFs() || isInIOSFullscreen) return;
    e.preventDefault();
    isDragging = true;
    seekToPosition(e);
  });

  document.addEventListener("mousemove", function(e) {
    if (isDragging) {
      e.preventDefault();
      seekToPosition(e);
    }
  });

  document.addEventListener("mouseup", function() {
    if (isDragging) {
      isDragging = false;
    }
  });

  // Touch interactions for progress bar scrubbing (mobile fullscreen)
  progressWrap.addEventListener("touchstart", function(e) {
    if (!isFs() || isInIOSFullscreen) return;
    e.preventDefault();
    isDragging = true;
    seekToPosition(e.touches[0]);
  }, { passive: false });

  document.addEventListener("touchmove", function(e) {
    if (isDragging) {
      e.preventDefault();
      seekToPosition(e.touches[0]);
    }
  }, { passive: false });

  document.addEventListener("touchend", function() {
    if (isDragging) {
      isDragging = false;
    }
  });

  // Keyboard support for progress bar - arrow keys seek in 5% increments (508 compliance)
  progressWrap.addEventListener("keydown", function(e) {
    if (!isFs() || isInIOSFullscreen || !v.duration || isNaN(v.duration)) return;
    var step = v.duration * 0.05;
    if (e.key === "ArrowRight" || e.key === "ArrowUp") {
      e.preventDefault();
      v.currentTime = Math.min(v.currentTime + step, v.duration);
      updateProgressBar();
      announceToSR("Seeked to " + Math.round((v.currentTime / v.duration) * 100) + " percent");
    } else if (e.key === "ArrowLeft" || e.key === "ArrowDown") {
      e.preventDefault();
      v.currentTime = Math.max(v.currentTime - step, 0);
      updateProgressBar();
      announceToSR("Seeked to " + Math.round((v.currentTime / v.duration) * 100) + " percent");
    } else if (e.key === "Home") {
      e.preventDefault();
      v.currentTime = 0;
      updateProgressBar();
      announceToSR("Seeked to start");
    } else if (e.key === "End") {
      e.preventDefault();
      v.currentTime = v.duration;
      updateProgressBar();
      announceToSR("Seeked to end");
    }
  });

  // =====================================================================
  // TOOLBAR KEYBOARD NAVIGATION - arrow keys move between controls (508 compliance)
  // =====================================================================

  var toolbar = wrap.querySelector('[role="toolbar"]');
  if (toolbar) {
    toolbar.addEventListener("keydown", function(e) {
      // Don't override arrow keys when focus is on the volume wrapper or progress bar.
      // These controls need arrow keys for their own value adjustment.
      if (document.activeElement === volWrap || document.activeElement === progressWrap) {
        if (e.key === "ArrowRight" || e.key === "ArrowLeft" ||
            e.key === "ArrowUp" || e.key === "ArrowDown") {
          return;
        }
      }

      var focusable = toolbar.querySelectorAll('button, [role="slider"]');
      var focusArray = Array.prototype.slice.call(focusable);
      // Filter out hidden elements (e.g., progress bar and play-from-start when not in fullscreen)
      focusArray = focusArray.filter(function(el) {
        return el.offsetParent !== null || el.offsetWidth > 0 || el.offsetHeight > 0;
      });
      var currentIndex = focusArray.indexOf(document.activeElement);

      if (currentIndex === -1) return;

      if (e.key === "ArrowRight" || e.key === "ArrowDown") {
        e.preventDefault();
        var nextIndex = (currentIndex + 1) % focusArray.length;
        focusArray[nextIndex].focus();
      } else if (e.key === "ArrowLeft" || e.key === "ArrowUp") {
        e.preventDefault();
        var prevIndex = (currentIndex - 1 + focusArray.length) % focusArray.length;
        focusArray[prevIndex].focus();
      } else if (e.key === "Home") {
        e.preventDefault();
        focusArray[0].focus();
      } else if (e.key === "End") {
        e.preventDefault();
        focusArray[focusArray.length - 1].focus();
      }
    });
  }
